  .cat-item.active-male { border-left-color:#3b82f6; background:#172033; color:#3b82f6; font-weight:700; }

let gender='male',activeCategory='QUINTA',editingIdx=null;

function switchGender(g){gender=g;activeCategory=Object.keys(DATA[g])[0];document.querySelectorAll('.tab-gender').forEach(t=>t.classList.remove('active'));document.querySelector('.tab-gender.'+g).classList.add('active');renderCategories();renderPlayers();renderGlobal();}
function renderCategories(){const panel=document.getElementById('categoriesPanel');const cats=Object.keys(DATA[gender]);panel.innerHTML='<div class="cat-label">Categorías</div>'+cats.map(cat=>{const count=DATA[gender][cat].length;const active=cat===activeCategory?(gender==='male'?'active-male':'active-female'):'';return`<div class="cat-item ${active}" onclick="selectCategory('${cat}')">${cat}<span class="cat-count">${count}</span></div>`;}).join('');}
function selectCategory(cat){activeCategory=cat;editingIdx=null;renderCategories();renderPlayers();}
function getSorted(cat,g){return[...DATA[g][cat]].sort((a,b)=>b.p-a.p||b.t-a.t);}
function getRank(sorted,idx){if(idx===0)return 1;if(sorted[idx].p===sorted[idx-1].p)return getRank(sorted,idx-1);return idx+1;}
function renderPlayers(){const panel=document.getElementById('playersPanel');const sorted=getSorted(activeCategory,gender);const gc=gender==='male'?'male':'female';const bc=gender==='male'?'':'female';let rows=sorted.map((p,i)=>{const r=getRank(sorted,i);let badge=r===1?'<span class="rank-badge rank-1">1°</span>':r===2?'<span class="rank-badge rank-2">2°</span>':r===3?'<span class="rank-badge rank-3">3°</span>':`<span class="rank-n">${r}°</span>`;return`<tr class="player-row"><td class="rank">${badge}</td><td>${p.n}</td><td class="pts-cell"><span class="pts-val ${gc}">${p.p.toLocaleString()}</span></td><td class="trn-cell">${p.t}</td><td class="acc-cell"><button class="btn-edit" onclick="openEdit(${i})">✏️</button><button class="btn-del" onclick="deletePlayer(${i})">🗑</button></td></tr>`;}).join('');panel.innerHTML=`<div class="section-header"><div class="section-title ${gc}">${activeCategory}</div><div class="section-badge">${sorted.length} jugadores</div><button class="btn-add ${bc}" onclick="openAdd()">+ Agregar</button></div><table><thead><tr><th class="num">Pos.</th><th>Jugador</th><th class="pts">Puntos</th><th class="trn">🏆 T.G.</th><th class="acc">Acción</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty">Sin jugadores.</td></tr>'}</tbody></table>`;}
function renderGlobal(){const q=document.getElementById('globalSearch').value.toLowerCase();let all=[];Object.keys(DATA[gender]).forEach(cat=>{DATA[gender][cat].forEach(p=>all.push({n:p.n,p:p.p,t:p.t,cat}));});all.sort((a,b)=>b.p-a.p||b.t-a.t);if(q)all=all.filter(p=>p.n.toLowerCase().includes(q));document.getElementById('globalSub').textContent=`${gender==='male'?'Masculino':'Femenino'} • ${all.length} jugadores`;let rank=0,lastPts=-1;document.getElementById('globalList').innerHTML=all.slice(0,100).map((p,i)=>{if(p.p!==lastPts){rank=i+1;lastPts=p.p;}const rCol=rank===1?'#b8860b':rank===2?'#6b7280':rank===3?'#78350f':'#4b5563';return`<div class="global-item"><span class="g-rank" style="color:${rCol}">${rank}°</span><span class="g-name">${p.n}</span><span class="g-cat">${p.cat}</span><span class="g-pts">${p.p.toLocaleString()}</span></div>`;}).join('')||'<div class="empty">Sin resultados</div>';}
function openAdd(){editingIdx=null;document.getElementById('modalTitle').textContent=`Agregar — ${activeCategory}`;document.getElementById('mName').value='';document.getElementById('mPts').value='';document.getElementById('mTrn').value='0';document.getElementById('modal').classList.add('show');}
function openEdit(i){const sorted=getSorted(activeCategory,gender);const p=sorted[i];editingIdx=DATA[gender][activeCategory].findIndex(x=>x.n===p.n&&x.p===p.p&&x.t===p.t);document.getElementById('modalTitle').textContent='Editar jugador';document.getElementById('mName').value=p.n;document.getElementById('mPts').value=p.p;document.getElementById('mTrn').value=p.t;document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');editingIdx=null;}
function savePlayer(){const name=document.getElementById('mName').value.trim();const pts=parseInt(document.getElementById('mPts').value)||0;const trn=parseInt(document.getElementById('mTrn').value)||0;if(!name){alert('Ingresá el nombre');return;}if(editingIdx!==null){DATA[gender][activeCategory][editingIdx]={n:name,p:pts,t:trn};}else{DATA[gender][activeCategory].push({n:name,p:pts,t:trn});}closeModal();renderCategories();renderPlayers();renderGlobal();}
function deletePlayer(i){const sorted=getSorted(activeCategory,gender);const p=sorted[i];if(!confirm(`¿Eliminar a ${p.n}?`))return;const idx=DATA[gender][activeCategory].findIndex(x=>x.n===p.n&&x.p===p.p&&x.t===p.t);DATA[gender][activeCategory].splice(idx,1);renderCategories();renderPlayers();renderGlobal();}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
renderCategories();renderPlayers();renderGlobal();
</script>
</body>
</html>
